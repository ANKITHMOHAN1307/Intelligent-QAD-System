services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    # Combine migrate AND gunicorn into one command
    command: sh -c "python manage.py migrate --noinput && gunicorn --bind 0.0.0.0:8000 --timeout 600 MainFolder.wsgi:application"
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: MainFolder.settings
      # ... (rest of your env variables)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  # ... (keep worker, redis, db services exactly as they were)