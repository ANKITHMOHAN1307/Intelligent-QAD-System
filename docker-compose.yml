services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: MainFolder.settings
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: qad_db
      DB_USER: qad_user
      DB_PASSWORD: qad_password
      DB_HOST: db
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A MainFolder worker --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: MainFolder.settings
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: qad_db
      DB_USER: qad_user
      DB_PASSWORD: qad_password
      DB_HOST: db
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qad_db
      POSTGRES_USER: qad_user
      POSTGRES_PASSWORD: qad_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qad_user -d qad_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: