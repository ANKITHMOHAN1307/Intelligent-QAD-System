<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Food Packet Scanner{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f7fb;
            --card: #ffffff;
            --ink: #1e293b;
            --muted: #64748b;
            --primary: #22c55e;
            --secondary: #3b82f6;
            --warn: #f97316;
            --danger: #ef4444;
            --border: #dbe3ec;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif;
            background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 45%);
            color: var(--ink);
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            padding: 20px;
        }
        
        .small { color: var(--muted); font-size: 0.92rem; }
        .btn { border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; cursor: pointer; font-weight: 600; }
        .btn:hover { filter: brightness(0.97); }
        .btn-primary { background: var(--primary); border-color: #16a34a; color: #fff; }
        .btn-secondary { background: var(--secondary); border-color: #2563eb; color: #fff; }
        .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
        .hero h1 { margin-top: 0; margin-bottom: 8px; }
        .scan-grid { display: grid; grid-template-columns: repeat(2, minmax(260px, 1fr)); gap: 18px; margin-top: 18px; }
        .scanner-box { min-height: 260px; border: 2px dashed var(--border); border-radius: 12px; }
        .preview-box { margin-top: 12px; border: 1px solid var(--border); border-radius: 12px; min-height: 220px; padding: 12px; display: grid; place-items: center; }
        .preview-box img { max-width: 100%; max-height: 210px; border-radius: 8px; }
        .result-panel { margin-top: 20px; }
        .classify-grid { display: grid; grid-template-columns: repeat(3, minmax(210px, 1fr)); gap: 12px; }
        .class-card { border-radius: 12px; border: 1px solid var(--border); padding: 14px; }
        .class-card h4 { margin-top: 0; }
        .organic { background: #f0fdf4; }
        .chemical { background: #eff6ff; }
        .additive { background: #fff7ed; }
        .class-card ul { margin: 0; padding-left: 18px; min-height: 48px; }
        .chart-wrap { background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; padding: 8px 12px; min-height: 300px; }
        .ocr-text { max-height: 180px; overflow: auto; background: #0f172a; color: #e2e8f0; border-radius: 12px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
        .status { margin-top: 16px; padding: 10px 12px; border-radius: 10px; display: none; font-weight: 600; }
        .status.show { display: block; }
        .status.info { background: #dbeafe; color: #1e40af; }
        .status.success { background: #dcfce7; color: #166534; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .status-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .pill { background: #e2e8f0; color: #334155; padding: 6px 10px; border-radius: 999px; font-size: 0.92rem; }
        .flow-card { margin-top: 18px; }
        .flow-steps { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
        .flow-step { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; background: #fff; font-weight: 600; }
        .flow-step small { display: block; color: var(--muted); font-weight: 500; margin-top: 2px; }
        .flow-step.active { border-color: #60a5fa; background: #eff6ff; }
        .flow-step.done { border-color: #86efac; background: #f0fdf4; }
        .flow-step.warn { border-color: #fdba74; background: #fff7ed; }

        @media (max-width: 900px) {
            .scan-grid, .classify-grid { grid-template-columns: 1fr; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
